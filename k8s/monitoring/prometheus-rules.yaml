apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vertexchain-alerts
  labels:
    role: alert-rules
spec:
  groups:
    - name: vertexchain-alerts
      rules:
        - alert: HighErrorRate
          expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High error rate detected"
        - alert: ServiceDown
          expr: up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Service is down"
