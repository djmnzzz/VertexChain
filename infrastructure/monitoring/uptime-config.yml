uptime:
  provider: betteruptime
  check_interval: 60

monitors:
  - name: VertexChain API Health
    url: https://api.vertexchain.com/health
    method: GET
    expected_status: 200
    regions: [us-east, eu-west, ap-southeast]
    alert_after: 2

  - name: VertexChain Frontend
    url: https://vertexchain.com
    method: GET
    expected_status: 200
    regions: [us-east, eu-west]
    alert_after: 2

  - name: VertexChain API Ping
    url: https://api.vertexchain.com/ping
    method: GET
    expected_status: 200
    regions: [us-east]
    alert_after: 1

response_time_thresholds:
  warning_ms: 1000
  critical_ms: 3000

status_page:
  enabled: true
  public_url: https://status.vertexchain.com
  components:
    - API
    - Frontend
    - Database
