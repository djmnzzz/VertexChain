# Prometheus configuration for VertexChain metrics collection
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert-rules.yml"
  - "vertexchain-exporter-rules.yml"

scrape_configs:
  - job_name: "vertexchain-backend"
    static_configs:
      - targets: ["localhost:3000"]
    metrics_path: /metrics

  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]

  # Custom VertexChain exporters (from scrape-configs.yml)
  - job_name: "vertexchain-gist-exporter"
    static_configs:
      - targets: ["vertexchain-monitoring:9101"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: "vertexchain-soroban-exporter"
    static_configs:
      - targets: ["vertexchain-monitoring:9102"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s

  - job_name: "vertexchain-postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s